[pytest]
# Configuración central de pytest

# Directorio de tests
testpaths = tests

# Patrones de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones de salida
addopts =
    -v
    --strict-markers
    --tb=short

# pytesseract usa pkgutil.find_loader() (deprecated en Python 3.12,
# eliminado en Python 3.14). Es un problema de la librería externa,
# no de nuestro código. Se silencia solo este warning específico.
filterwarnings =
    ignore::DeprecationWarning:pytesseract

# Markers personalizados
markers =
    unit: Tests unitarios (sin dependencias externas)
    integration: Tests de integración (requieren sistema)
    slow: Tests lentos
    ocr: Tests que requieren Tesseract
    skip_ci: Tests para saltar en CI/CD

# Archivos a ignorar
norecursedirs = 
    .git
    .venv
    venv
    __pycache__
    .pytest_cache
    *.egg-info
    build
    dist

# Opciones de cobertura
[coverage:run]
source = src
omit = 
    */tests/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
